name: Сборка Flet APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # Шаг 1: Запускаем первичную генерацию проекта во Flet (без ограничений на права)
      - name: Генерация структуры Flutter-проекта
        run: |
          flet build apk --flutter-build-args="--target-platform android-arm,android-arm64"

      # Шаг 2: Системный поиск AndroidManifest.xml и жесткая инжекция нужного разрешения
      - name: Принудительное внедрение разрешения MANAGE_EXTERNAL_STORAGE в Манифест
        run: |
          find build -name "AndroidManifest.xml" -exec sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"\/>' {} \;
          echo "Разрешение успешно инжектировано в файлы манифеста."

      # Шаг 3: Финальная упаковка APK сборщиком Flet
      - name: Финальная сборка и упаковка APK
        run: |
          flet build apk --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
