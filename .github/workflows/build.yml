name: Сборка Flet APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # Генерируем проект, чтобы Flet развернул свои временные файлы в системе
      - name: Генерация структуры Android проекта
        run: |
          flet build apk --patch || true

      # ПРАВИЛЬНЫЙ ПОИСК: Ищем по всей файловой системе сервера, включая временную папку /tmp
      - name: Принудительное исправление AndroidManifest
        run: |
          echo "Запускаем глобальный поиск манифеста..."
          MANIFEST_PATH=$(find / -name "AndroidManifest.xml" 2>/dev/null | grep -E "android/app/src/main|flet_flutter_build" | head -n 1)
          
          if [ -n "$MANIFEST_PATH" ] && [ -f "$MANIFEST_PATH" ]; then
            echo "Файл успешно найден по пути: $MANIFEST_PATH"
            sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' "$MANIFEST_PATH"
            echo "Разрешение успешно внедрено. Проверяем результат:"
            cat "$MANIFEST_PATH" | grep -C 3 "MANAGE_EXTERNAL_STORAGE"
          else
            echo "Глобальный поиск не дал результатов, пробуем найти абсолютно любой AndroidManifest..."
            MANIFEST_PATH=$(find / -name "AndroidManifest.xml" 2>/dev/null | head -n 1)
            if [ -n "$MANIFEST_PATH" ] && [ -f "$MANIFEST_PATH" ]; then
              sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' "$MANIFEST_PATH"
              echo "Модифицирован манифест по пути: $MANIFEST_PATH"
            else
              echo "Критическая ошибка: Сборщик Flet не создал манифест."
              exit 1
            fi
          fi

      # Собираем финальный APK
      - name: Сборка финального APK
        run: |
          flet build apk

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
