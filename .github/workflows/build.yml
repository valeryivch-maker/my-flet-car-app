name: build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка строго фиксированной версии Flet
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet

      - name: Глубокая очистка репозитория от мусорных скриптов
        run: |
          find . -type f -name "*.txt" -not -name "requirements.txt" -delete
          find . -type f -name "*_sync.py" -delete
          rm -f cron_weekly_check.py network_template.py
          rm -f patch.py ci_fix.py patch_part1.py

      - name: Сборка финального APK
        run: |
          flet build apk \
            --project "carjournal" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            -vv
