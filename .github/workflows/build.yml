name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet requests urllib3

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters

      - name: Роботизированная сборка упорядоченного монолита в облаке
        run: |
          # Собираем монолит с правильной иерархией слоев выполнения Python
          python -c '
          import os
          m = open("main.py", "r", encoding="utf-8").read().replace("\ufeff", "")
          e = open("engine.py", "r", encoding="utf-8").read().replace("\ufeff", "")
          n = open("network.py", "r", encoding="utf-8").read().replace("\ufeff", "")
          v = open("views.py", "r", encoding="utf-8").read().replace("\ufeff", "")
          
          # Очищаем перекрестные директивы импорта во всех модулях
          for k in ["import network", "import engine", "import views", "from datetime import datetime, timedelta", "import flet as ft"]:
              m, e, n, v = m.replace(k, f"# {k}"), e.replace(k, f"# {k}"), n.replace(k, f"# {k}"), v.replace(k, f"# {k}")
              
          # Собираем строго по цепочке: База -> Интерфейс -> Сетевые триггеры -> Точка запуска main
          with open("main.py", "w", encoding="utf-8") as f:
              f.write(f"import sys, os, json, io, time, traceback, requests, urllib3, glob, shutil\nfrom datetime import datetime, timedelta\nfrom concurrent.futures import ThreadPoolExecutor\nimport flet as ft\n\n# --- СЛОЙ 1: БАЗОВЫЙ ДВИЖОК И ДАННЫЕ ---\n{e}\n\n# --- СЛОЙ 2: ГРАФИЧЕСКИЕ ОКНА И UI ---\n{v}\n\n# --- СЛОЙ 3: СЕТЕВАЯ СИНХРОНИЗАЦИЯ ---\n{n}\n\n# --- СЛОЙ 4: ТОЧКА ВХОДА ПРИЛОЖЕНИЯ ---\n{m}")
          print("[ОБЛАКО] Иерархический монолит успешно сформирован!")
          '

      - name: Сборка финального APK
        run: |
          flet build apk \
            --project "carjournal" \
            --product "Бортовой журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: "**/build/apk/*.apk"
          if-no-files-found: error
