name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet requests urllib3

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters

      - name: Роботизированная сборка монолитного ядра в облаке
        run: |
          # Создаем временный скрипт автосклейки, который читает файлы из папки src/
          cat << 'EOF' > cloud_compiler.py
          import os

          # Определяем пути к файлам разработки, лежащим в папке src
          engine_path = os.path.join("src", "engine.py") if os.path.exists(os.path.join("src", "engine.py")) else "engine.py"
          network_path = os.path.join("src", "network.py") if os.path.exists(os.path.join("src", "network.py")) else "network.py"
          views_path = os.path.join("src", "views.py") if os.path.exists(os.path.join("src", "views.py")) else "views.py"
          main_path = os.path.join("src", "main.py") if os.path.exists(os.path.join("src", "main.py")) else "main.py"

          # Читаем исходный код и очищаем от Windows BOM маркеров
          with open(engine_path, "r", encoding="utf-8") as f: engine_code = f.read().replace("\ufeff", "")
          with open(network_path, "r", encoding="utf-8") as f: network_code = f.read().replace("\ufeff", "")
          with open(views_path, "r", encoding="utf-8") as f: views_code = f.read().replace("\ufeff", "")
          with open(main_path, "r", encoding="utf-8") as f: main_code = f.read().replace("\ufeff", "")

          # Вырезаем конфликтующие строки импортов
          for mod in ["import network", "import engine", "import views", "from datetime import datetime, timedelta", "import flet as ft"]:
              engine_code = engine_code.replace(mod, f"# Склеено: {mod}")
              network_code = network_code.replace(mod, f"# Склеено: {mod}")
              views_code = views_code.replace(mod, f"# Склеено: {mod}")
              main_code = main_code.replace(mod, f"# Склеено: {mod}")

          # Собираем эталонную монолитную структуру во флэт-директорию сервера
          monolith = f"""import sys
          import os
          import json
          import io
          import time
          import traceback
          import requests
          import urllib3
          import glob
          import shutil
          from datetime import datetime, timedelta
          from concurrent.futures import ThreadPoolExecutor
          import flet as ft

          # --- ENGINE ---
          {engine_code}

          # --- NETWORK ---
          {network_code}

          # --- VIEWS ---
          {views_code}

          # --- MAIN ---
          {main_code}
          """
          
          # Записываем монолит строго в корень, где его ждет Flet CLI
          with open("main.py", "w", encoding="utf-8") as f:
              f.write(monolith)
          print("[УСПЕХ] Облачная сборка монолитного ядра выполнена из папки src!")
          EOF
          
          # Запускаем сборщик монолита
          python cloud_compiler.py

      - name: Сборка финального APK
        run: |
          flet build apk \
            --project "carjournal" \
            --product "Бортовой журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: "**/build/apk/*.apk"
          if-no-files-found: error
