name: Сборка Flet APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: Сборка финального APK
        run: |
          flet build apk

      - name: Переименование установочного файла под текущую версию
        run: |
          # Вшиваем версию программы прямо в название итогового файла APK
          mv build/apk/app-release.apk build/apk/CarJournal_v1.2.5_build11.apk || true

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
