name: build
on:
 push:
   branches:
     - main
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Проверка кода проекта
       uses: actions/checkout@v4
     - name: Настройка точной версии Flutter SDK
       uses: subosito/flutter-action@v2
       with:
         cache: false
         flutter-version: '3.41.7'
         channel: 'stable'
     - name: Настройка Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.13'
     - name: Установка современного компилятора Flet через pipx
       run: |
         pipx install flet --include-deps
     - name: Безопасная очистка кэша шаблонов Flet
       run: |
         rm -rf ~/.cookiecutters
         rm -rf ~/.flet
     - name: Сборка финального APK
       run: |
         pipx run flet build apk \
           --project "carjournal" \
           --product "Бортовой журнал" \
           --org "com.flet" \
           --build-version "1.2.6" \
           --build-number 12 \
           --yes
     - name: Сохранение готового APK в облако
       uses: actions/upload-artifact@v4
       with:
         name: carjournal-release-apk
         path: "**/build/apk/*.apk"
         if-no-files-found: error