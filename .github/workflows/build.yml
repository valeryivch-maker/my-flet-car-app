name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet
      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters

      - name: Подготовка монолитного ядра для сборщика
        run: |
          # Переименовываем сгенерированный монолит в main.py для обхода ограничений CLI
          mv main_monolith.py main.py

      - name: Сборка финального APK
        run: |
          flet build apk \
            --project "carjournal" \
            --product "Бортовой журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            --yes