name: build
on:
 push:
   branches:
     - main
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Проверка кода проекта
       uses: actions/checkout@v4
     - name: Настройка точной версии Flutter SDK
       uses: subosito/flutter-action@v2
       with:
         cache: false
         flutter-version: '3.41.7'
         channel: 'stable'
     - name: Настройка Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.13'
     - name: Очистка app.py от невидимого символа BOM
       run: |
         if [ -f "app.py" ]; then
           sed -i '1s/^\xEF\xBB\xBF//' app.py
           echo "BOM удален."
         fi
     - name: Исправление функции копирования во views.py
       run: |
         if [ -f "views.py" ]; then
           cat << 'EOF' > fix_script.py
import re
with open("views.py", "r", encoding="utf-8") as f:
    code = f.read()
perfect_copy = '''def make_copy(code_to_copy=rec.get('part_code', '')):
        def do_copy(_):
            import os
            if os.name == "nt":
                try:
                    import subprocess
                    subprocess.run(f"echo {str(code_to_copy).strip()} | clip", shell=True, check=True)
                    show_msg(f"📋 Артикул {code_to_copy} скопирован!")
                except:
                    pass
            else:
                try:
                    page.set_clipboard(str(code_to_copy))
                    show_msg(f"📋 Артикул {code_to_copy} скопирован!")
                except:
                    try:
                        page.clipboard = str(code_to_copy)
                        show_msg(f"📋 Артикул {code_to_copy} скопирован!")
                    except:
                        show_msg("Ошибка копирования!")
        return do_copy'''
pattern = r"def make_copy\(.*?\):.*?return do_copy"
if re.search(pattern, code, re.DOTALL):
    code = re.sub(pattern, perfect_copy, code, flags=re.DOTALL)
else:
    code = code.replace("def make_copy(code_to_copy=rec.get('part_code', '')):", perfect_copy)
with open("views.py", "w", encoding="utf-8") as f:
    f.write(code)
EOF
           python3 fix_script.py
           rm fix_script.py
           echo "views.py успешно исправлен."
         fi
     - name: Принятие лицензий Android SDK
       run: |
         yes | ssdk="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
         if [ ! -f "$ssdk" ]; then ssdk=$(find $ANDROID_HOME -name "sdkmanager" | head -n 1); fi
         yes | $ssdk --licenses || true
     - name: Установка стабильного компилятора Flet
       run: |
         pip install --upgrade pip
         pip install flet==0.23.2
     - name: Безопасная очистка кэша шаблонов Flet
       run: |
         rm -rf ~/.cookiecutters
         rm -rf ~/.flet
     - name: Сборка финального APK
       run: |
         flet build apk \
           --project "carjournal" \
           --org "com.flet" \
           --build-version "1.2.6" \
           --build-number 12
     - name: Сохранение готового APK в облако
       uses: actions/upload-artifact@v4
       with:
         name: carjournal-release-apk
         path: "**/build/apk/*.apk"
         if-no-files-found: error