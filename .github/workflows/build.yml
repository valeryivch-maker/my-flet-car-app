name: Сборка Flet APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Восстановление сетевого шлюза из шаблона и Secrets
        # Извлекаем скрытый токен из сейфа GitHub и собираем network.py на лету
        env:
          SECRET_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          sed "s/СЮДА_GITHUB_ACTIONS_ПОДСТАВИТ_ТОКЕН/$SECRET_BOT_TOKEN/g" network_template.py > network.py
          echo "[УСПЕХ] Модуль network.py успешно сгенерирован для компиляции!"

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: Сборка финального APK с флагами разрешений сети
        run: |
          # Флаги --android-permissions принудительно вшивают интернет на уровне компилятора Flutter/Flet
          find . -name 'AndroidManifest.xml' -exec sed -i 's/android:label="[^"]*"/android:label="Бортовой журнал"/g' {} + || true
          find . -name 'strings.xml' -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Бортовой журнал<\/string>/g' {} + || true
          find . -name 'AndroidManifest.xml' -exec sed -i 's/android:label="[^"]*"/android:label="Бортовой журнал"/g' {} + || true
          find . -name 'strings.xml' -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Бортовой журнал<\/string>/g' {} + || true
          # Генерируем проект через Flet\n          flet build apk --no-compile || flet build apk || true\n          # Заменяем имя в сгенерированных кэшах Flutter\n          find build/ -name 'AndroidManifest.xml' -exec sed -i 's/android:label="[^"]*"/android:label="Бортовой журнал"/g' {} + || true\n          find build/ -name 'strings.xml' -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Бортовой журнал<\/string>/g' {} + || true\n          # Запускаем чистую сборку с русским именем\n          flet build apk

      - name: Переименование установочного файла под текущую версию
        run: |
          # Вшиваем версию программы под текущий Build №12
          mv build/apk/app-release.apk build/apk/CarJournal_v1.2.5_build12.apk || true

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk