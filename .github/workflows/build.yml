name: build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4
      - name: Настройка Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.22.2'
          channel: 'stable'
      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установка Flet и зависимостей
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2 requests urllib3
      - name: Сборка отладочного APK
        run: |
          flet build apk
      - name: Сохранение готового APK
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-package
          path: build/apk/*.apk
