name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet

      - name: Сборка финального APK
        run: |
          # Передаем параметры намертво через аргументы командной строки CLI.
          # Это заставит компилятор упаковать network.py в корень и прописать красивое имя.
          flet build apk --yes --product "Бортовой журнал" --package "com.flet.carjournal" --version "1.2.6" --build-number 12
          
      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: build/apk/*.apk
