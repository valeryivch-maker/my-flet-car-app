name: CI Production Clean Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet with CLI
      run: |
        python -m pip install --upgrade pip
        pip install "flet[cli]"

    - name: Build Android APK Package
      run: |
        # Корректный вызов сборщика без устаревших флагов name
        flet build apk
