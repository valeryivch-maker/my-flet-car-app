name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet requests urllib3

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters

      - name: Автоматическое создание структуры проекта в облаке
        run: |
          # Создаем изолированную папку src и копируем туда все Python-файлы и базу
          mkdir -p src_build
          cp *.py src_build/ 2>/dev/null || true
          if [ -f "database.txt" ]; then cp database.txt src_build/; fi
          if [ -f "app_config.txt" ]; then cp app_config.txt src_build/; fi
          
          # Настраиваем относительные импорты для Android внутри main.py
          sed -i '1s/^/import sys\nimport os\nif os.getcwd() not in sys.path: sys.path.insert(0, os.getcwd())\n/' src_build/main.py

      - name: Сборка финального APK
        run: |
          # Запускаем компиляцию из автоматически созданной папки src_build
          flet build apk src_build \
            --project "carjournal" \
            --product "Бортовой журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: "**/build/apk/*.apk"
          if-no-files-found: error
