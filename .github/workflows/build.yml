name: build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка совместимой версии Flutter SDK (Ветка 3.22)
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Создание и защита файла зависимостей для Android рантайма
        run: |
          echo "requests" > requirements.txt
          echo "urllib3" >> requirements.txt
          echo "flet-embed==0.23.2" >> requirements.txt
          
          echo "flet==0.23.2" > constraints.txt
          echo "flet-core==0.23.2" >> constraints.txt
          echo "flet-runtime==0.23.2" >> constraints.txt
          echo "flet-embed==0.23.2" >> constraints.txt

      - name: Установка строго фиксированной версии Flet
        env:
          PIP_CONSTRAINT: constraints.txt
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet

      - name: Принудительный инжект русского названия Бортовой Журнал
        run: |
          # Если flet.yaml существует, жестко прописываем имя туда через Python
          python3 -c "
          import os
          yaml_path = 'flet.yaml'
          if os.path.exists(yaml_path):
              lines = open(yaml_path).readlines()
              new_lines = []
              for line in lines:
                  if line.strip().startswith('name:'):
                      new_lines.append('name: "Бортовой Журнал"\n')
                  else:
                      new_lines.append(line)
              open(yaml_path, 'w').writelines(new_lines)
          else:
              # Если конфигурационного файла нет, создаем дефолтный с правильным именем
              with open(yaml_path, 'w') as f:
                  f.write('app:\n  name: "Бортовой Журнал"\n')
          print('[CONFIG] Русское название успешно интегрировано в flet.yaml!')
          "

      - name: Безопасная фильтрация репозитория
        run: |
          find . -type f -name "*.txt" -not -name "requirements.txt" -not -name "constraints.txt" -delete
          find . -type f -name "*_sync.py" -delete
          rm -f cron_weekly_check.py network_template.py patch.py ci_fix.py patch_part1.py fix_app.py

      - name: Сборка финального APK (Безопасное имя для файловой системы)
        env:
          PIP_CONSTRAINT: ${{ github.workspace }}/constraints.txt
        run: |
          flet build apk \
            --project "carjournal" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            -vv

      - name: Динамическое сохранение готового APK (Поиск по маске)
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: "**/build/**/*.apk"
          if-no-files-found: error
