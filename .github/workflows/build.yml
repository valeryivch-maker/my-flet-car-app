name: Сборка Flet APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # Сборщик создает структуру проекта во временной папке перед финальной компиляцией
      - name: Предварительная сборка проекта Flet
        run: |
          flet build apk --yes

      # Принудительная инжекция прав MANAGE_EXTERNAL_STORAGE прямо в сгенерированный код
      - name: Принудительное внедрение разрешения в AndroidManifest
        run: |
          find . -name "AndroidManifest.xml" -exec sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"\/>' {} \;
          echo "Разрешение успешно добавлено в Манифест."

      # Повторный вызов flet build apk подхватит измененный манифест и перепакует APK
      - name: Финальная пересборка итогового APK
        run: |
          flet build apk --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
