name: Сборка Flet APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # Инициализируем проект Flet, чтобы создалась внутренняя структура Flutter
      - name: Подготовка окружения сборки
        run: |
          flet build apk --no-build || true

      # ПРЯМАЯ ИНЖЕКЦИЯ: Вставляем разрешение строго ПЕРЕД тегом <application>, не нарушая синтаксис
      - name: Принудительное исправление AndroidManifest
        run: |
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | grep "main/AndroidManifest.xml" | head -n 1)
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' "$MANIFEST_PATH"
            echo "Манифест успешно обновлен по пути: $MANIFEST_PATH"
            cat "$MANIFEST_PATH"
          else
            echo "Файл AndroidManifest.xml не найден!"
            exit 1
          fi

      # Запускаем финальную компиляцию
      - name: Сборка финального APK
        run: |
          flet build apk

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
