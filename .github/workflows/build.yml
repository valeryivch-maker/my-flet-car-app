name: build
on:
 push:
   branches:
     - main
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Проверка кода проекта
       uses: actions/checkout@v4
     - name: Настройка точной версии Flutter SDK
       uses: subosito/flutter-action@v2
       with:
         cache: false
         flutter-version: '3.41.7'
         channel: 'stable'
     - name: Настройка Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.13'
     - name: Автоматический фикс синтаксиса на сервере
       run: |
         # 1. Тотальное удаление BOM (U+FEFF) из app.py на любой строке через sed
         if [ -f "app.py" ]; then
           sed -i 's/\xEF\xBB\xBF//g' app.py
           echo "✅ BOM удален из app.py"
         fi
         
         # 2. Исправление разорванных строк во views.py (удаляем переносы внутри кавычек)
         if [ -f "views.py" ]; then
           # Склеиваем разорванную строку со словами Быстрый сброс
           sed -i 'N;s/"Быстрый\n[[:space:]]*сброс"/"Быстрый сброс"/g;P;D' views.py
           sed -i 's/"Быстрый\n/"Быстрый сброс"/g' views.py
           
           # Склеиваем разорванную строку с тултипом История ТО (Просмотр и удаление)
           sed -i 's/tooltip="Просмотр и/tooltip="Просмотр и удаление истории записей"/g' views.py
           sed -i '/удаление истории записей",/d' views.py
           
           echo "✅ Все разорванные строки во views.py склеены!"
         fi
     - name: Локальный тест компиляции (Контрольная проверка)
       run: |
         python3 -m compileall .
     - name: Принятие лицензий Android SDK
       run: |
         yes | ssdk="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
         if [ ! -f "$ssdk" ]; then ssdk=$(find $ANDROID_HOME -name "sdkmanager" | head -n 1); fi
         yes | $ssdk --licenses || true
     - name: Установка стабильного компилятора Flet
       run: |
         pip install --upgrade pip
         pip install flet==0.23.2
     - name: Безопасная очистка кэша шаблонов Flet
       run: |
         rm -rf ~/.cookiecutters
         rm -rf ~/.flet
     - name: Сборка финального APK
       run: |
         flet build apk \
           --project "carjournal" \
           --org "com.flet" \
           --build-version "1.2.6" \
           --build-number 12
     - name: Сохранение готового APK в облако
       uses: actions/upload-artifact@v4
       with:
         name: carjournal-release-apk
         path: "**/build/apk/*.apk"
         if-no-files-found: error