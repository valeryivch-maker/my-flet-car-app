name: Сборка Flet APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Сборка финального APK (Без вопросов в консоли)
        run: |
          yes | flet build apk --no-interactive

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
