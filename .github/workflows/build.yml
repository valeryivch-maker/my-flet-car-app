name: CI Production Clean Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Build Android APK Package
      run: |
        # Чистая компиляция без использования старого бинарного кэша
        flet pack main.py --apk --name "CarJournal"
