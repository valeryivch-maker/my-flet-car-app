name: build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка совместимой версии Flutter SDK (Ветка 3.22)
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Создание и защита файла зависимостей для Android рантайма
        run: |
          # Создаем чистый requirements.txt, который serious_python зашьет внутрь APK
          echo "requests" > requirements.txt
          echo "urllib3" >> requirements.txt
          echo "flet-embed==0.23.2" >> requirements.txt
          
          # Создаем глобальный файл ограничений для самого pip сборщика
          echo "flet==0.23.2" > constraints.txt
          echo "flet-core==0.23.2" >> constraints.txt
          echo "flet-runtime==0.23.2" >> constraints.txt
          echo "flet-embed==0.23.2" >> constraints.txt

      - name: Установка строго фиксированной версии Flet
        env:
          PIP_CONSTRAINT: constraints.txt
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet

      - name: Безопасная фильтрация репозитория (Сохраняем requirements.txt)
        run: |
          # Удаляем мусорные txt, но аккуратно игнорируем requirements.txt и constraints.txt
          find . -type f -name "*.txt" -not -name "requirements.txt" -not -name "constraints.txt" -delete
          find . -type f -name "*_sync.py" -delete
          rm -f cron_weekly_check.py network_template.py patch.py ci_fix.py patch_part1.py fix_app.py

      - name: Сборка финального APK (С оригинальным названием "Бортовой Журнал")
        env:
          PIP_CONSTRAINT: ${{ github.workspace }}/constraints.txt
        run: |
          flet build apk \
            --project "Бортовой Журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            -vv

      - name: Динамическое сохранение готового APK (Поиск по маске)
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: "**/build/**/*.apk"
          if-no-files-found: error
