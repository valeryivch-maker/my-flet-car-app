name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet

      - name: Сборка финального APK с подменой имени
        run: |
          # Создаем проект через Flet без компиляции, чтобы он сгенерировал папки
          flet build apk --yes || true
          
          # Жестко прописываем имя в сгенерированные файлы Flutter и Android ресурсов
          find . -name "strings.xml" -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Бортовой журнал<\/string>/g' {} + || true
          find . -name "AndroidManifest.xml" -exec sed -i 's/android:label="[^"]*"/android:label="Бортовой журнал"/g' {} + || true
          find . -name "pubspec.yaml" -exec sed -i 's/name: .*/name: carjournal/g' {} + || true
          
          # Запускаем сборку заново, чтобы Gradle собрал измененные файлы
          flet build apk --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: build/apk/*.apk
