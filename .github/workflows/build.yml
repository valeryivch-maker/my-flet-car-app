name: build
on:
 push:
   branches:
     - main
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Проверка кода проекта
       uses: actions/checkout@v4
     - name: Настройка точной версии Flutter SDK
       uses: subosito/flutter-action@v2
       with:
         cache: false
         flutter-version: '3.41.7'
         channel: 'stable'
     - name: Настройка Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.13'
     - name: Автоматический фикс синтаксиса на сервере
       run: |
         # 1. Принудительное вырезание BOM из app.py на любой строке
         if [ -f "app.py" ]; then
           python3 -c "with open('app.py', 'r', encoding='utf-8-sig') as f: code = f.read()
with open('app.py', 'w', encoding='utf-8') as f: f.write(code)"
           echo "✅ BOM из app.py успешно удален!"
         fi
         
         # 2. Склеивание разорванной строки во views.py
         if [ -f "views.py" ]; then
           python3 -c "with open('views.py', 'r', encoding='utf-8') as f: code = f.read()
# Находим разорванный кусок и склеиваем в одну строку
code = code.replace('"Быстрый\nсброс"', '"Быстрый сброс"')
code = code.replace('"Быстрый\n сброс"', '"Быстрый сброс"')
with open('views.py', 'w', encoding='utf-8') as f: f.write(code)"
           echo "✅ Разорванная строка во views.py исправлена!"
         fi
     - name: Локальный тест компиляции (Контрольная проверка)
       run: |
         python3 -m compileall .
     - name: Принятие лицензий Android SDK
       run: |
         yes | ssdk="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
         if [ ! -f "$ssdk" ]; then ssdk=$(find $ANDROID_HOME -name "sdkmanager" | head -n 1); fi
         yes | $ssdk --licenses || true
     - name: Установка стабильного компилятора Flet
       run: |
         pip install --upgrade pip
         pip install flet==0.23.2
     - name: Безопасная очистка кэша шаблонов Flet
       run: |
         rm -rf ~/.cookiecutters
         rm -rf ~/.flet
     - name: Сборка финального APK
       run: |
         flet build apk \
           --project "carjournal" \
           --org "com.flet" \
           --build-version "1.2.6" \
           --build-number 12
     - name: Сохранение готового APK в облако
       uses: actions/upload-artifact@v4
       with:
         name: carjournal-release-apk
         path: "**/build/apk/*.apk"
         if-no-files-found: error