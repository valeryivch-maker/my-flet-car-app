name: Сборка Flet APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'

      - name: Установка зависимостей Python
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # ШАГ 1: Запускаем генерацию проекта. Команда создаст все файлы, включая AndroidManifest
      - name: Генерация структуры Android проекта
        run: |
          flet build apk --patch || true

      # ШАГ 2: Теперь файл точно на месте. Находим его и аккуратно вставляем разрешение
      - name: Принудительное исправление AndroidManifest
        run: |
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | grep -E "android/app/src/main|build/android" | head -n 1)
          if [ -n "$MANIFEST_PATH" ] && [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' "$MANIFEST_PATH"
            echo "Манифест успешно обновлен по пути: $MANIFEST_PATH"
            cat "$MANIFEST_PATH" | grep -C 3 "MANAGE_EXTERNAL_STORAGE"
          else
            echo "Файл AndroidManifest.xml все еще не создан, пробуем альтернативный поиск..."
            MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
            if [ -f "$MANIFEST_PATH" ]; then
              sed -i '/<application/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' "$MANIFEST_PATH"
              echo "Манифест найден по альтернативному пути: $MANIFEST_PATH"
            else
              echo "Критическая ошибка: Манифест не найден ни в одной папке!"
              exit 1
            fi
          fi

      # ШАГ 3: Запускаем чистую финальную сборку уже с модифицированным манифестом
      - name: Сборка финального APK
        run: |
          flet build apk

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: flet-car-app-release
          path: build/apk/*.apk
