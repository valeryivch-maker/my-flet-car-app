name: build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Принятие лицензий Android SDK
        run: |
          yes | ssdk="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$ssdk" ]; then ssdk=$(find $ANDROID_HOME -name "sdkmanager" | head -n 1); fi
          yes | $ssdk --licenses || true

      - name: Установка строго фиксированной версии Flet
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet

      - name: Предварительная очистка репозитория от мусора
        run: |
          rm -f database.txt
          rm -f local_folder_sync.py
          rm -f smart_cloud_sync.py
          rm -f patch.py
          rm -f ci_fix.py patch_part1.py

      - name: Сборка финального APK
        env:
          SERIOUS_PYTHON_COMPILE_OPTS: "-O0"
        run: |
          flet build apk \
            --project "carjournal" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12
