name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Установка зависимостей Python
        run: |
          pip install flet requests urllib3

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters

      - name: Сборка финального APK
        run: |
          # Вызываем сборщик напрямую через Python, чтобы обойти старый глобальный flet-cli
          ~/.local/bin/flet build apk \
            --project "carjournal" \
            --product "Бортовой журнал" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12 \
            --yes

      - name: Сохранение готового APK в облако
        uses: actions/upload-artifact@v4
        with:
          name: carjournal-release-apk
          path: build/**/*.apk
          if-no-files-found: error
