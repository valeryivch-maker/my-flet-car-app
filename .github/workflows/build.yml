name: build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода проекта
        uses: actions/checkout@v4

      - name: Настройка точной версии Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          cache: false
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка строго фиксированной версии Flet
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2

      - name: Безопасная очистка кэша шаблонов Flet
        run: |
          rm -rf ~/.cookiecutters
          rm -rf ~/.flet

      - name: Гарантированное лечение BOM и отступов силами Python
        run: |
          python3 -c "
          import os
          
          # 1. Лечим app.py от любых скрытых BOM (U+FEFF)
          if os.path.exists('app.py'):
              with open('app.py', 'rb') as f:
                  raw = f.read()
              # Декодируем с отсечением BOM и кодируем в чистый UTF-8
              clean_text = raw.decode('utf-8-sig', errors='ignore').replace('\ufeff', '')
              with open('app.py', 'w', encoding='utf-8') as f:
                  f.write(clean_text)
              print('[CI-PYTHON] app.py успешно очищен от BOM!')
              
          # 2. Лечим views.py от IndentationError на строке 567
          if os.path.exists('views.py'):
              with open('views.py', 'r', encoding='utf-8', errors='ignore') as f:
                  lines = f.readlines()
              if len(lines) >= 567:
                  # Находим строку 566 (индекс 565) и проверяем, есть ли там оборванный except
                  if 'except:' in lines[565] or 'except ' in lines[565]:
                      # Вставляем pass с правильным отступом на строку 567
                      lines.insert(566, '                pass\n')
                      with open('views.py', 'w', encoding='utf-8') as f:
                          f.writelines(lines)
                      print('[CI-PYTHON] views.py успешно защищен заглушкой pass!')
          "

      - name: Глубокая очистка репозитория от мусорных скриптов
        run: |
          find . -type f -name "*.txt" -not -name "requirements.txt" -delete
          find . -type f -name "*_sync.py" -delete
          rm -f cron_weekly_check.py network_template.py
          rm -f patch.py ci_fix.py patch_part1.py

      - name: Сборка финального APK
        run: |
          flet build apk \
            --project "carjournal" \
            --org "com.flet" \
            --build-version "1.2.6" \
            --build-number 12
