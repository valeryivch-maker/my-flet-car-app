product: "Журнал ТО"
description: "Автономный журнал технического обслуживания автомобиля"
org: "com.mycompany"
bundle_id: "com.mycompany.carjournal"
build_version: "1.2.5"
build_number: 11  # Поднимаем номер сборки для принудительного обновления на телефоне

android:
  permissions:
    - "android.permission.INTERNET"
    - "android.permission.ACCESS_NETWORK_STATE"
  intent_filters:
    - action: "android.intent.action.VIEW"
      categories:
        - "android.intent.category.DEFAULT"
        - "android.intent.category.BROWSABLE"
      data:
        - scheme: "content"
          mimeType: "application/json"
        - scheme: "file"
          mimeType: "application/json"
        - host: "*"
          pathPattern: ".*\\.json"
